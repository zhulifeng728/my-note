name: mobile
description: A local-first notes app with cross-device sync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 数据库
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # 网络
  dio: ^5.4.1
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2

  # 富文本编辑器
  flutter_quill: ^11.5.0

  # 图片处理
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # 设备发现和配对
  mobile_scanner: ^4.0.1
  nsd: ^2.3.0
  flutter_secure_storage: ^9.0.0

  # 后台任务
  workmanager: ^0.5.2

  # 导出和分享
  pdf: ^3.10.8
  share_plus: ^7.2.2

  # 工具库
  uuid: ^3.0.7
  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  drift_dev: ^2.16.0

  # 代码规范
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
